<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ChatOn — Offline</title>
    <meta name="theme-color" content="#040609" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(0deg, #040609, #040609 10%, #050e1d 40%, #050e1d);
        color: #e5e7eb;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 2rem;
      }
      .container { max-width: 400px; }
      .icon {
        width: 64px; height: 64px; margin: 0 auto 1.5rem;
        border-radius: 16px;
      }
      h1 { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.75rem; color: #fff; }
      p { font-size: 1rem; line-height: 1.5; color: #9ca3af; margin-bottom: 1.5rem; }
      button {
        padding: 0.75rem 2rem;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.1);
        background: rgba(255,255,255,0.05);
        color: #fff;
        font-size: 1rem;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.2s;
      }
      button:hover { background: rgba(255,255,255,0.1); }
    </style>
  </head>
  <body>
    <div class="container">
      <img src="/apple-touch-icon.png" alt="ChatOn" class="icon" />
      <h1>You're offline</h1>
      <p>ChatOn needs an internet connection to load messages from the DeSo blockchain. Please check your connection and try again.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
