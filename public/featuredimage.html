<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1200">
    <title>ChatOn OG Image</title>
    <style>
        @import url('https://api.fontshare.com/v2/css?f[]=satoshi@700,900&display=swap');

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* Extracted from ChatOn logo + SVG gradients */
            --teal-deep:   #0D3D3A;
            --teal-mid:    #1A8A6E;
            --aqua:        #20E0AA;
            --cyan:        #40D8C8;
            --blue-brand:  #0085FF;
            --blue-light:  #7EC0FF;
            --blue-ice:    #CEEAFF;
            --green-pop:   #34F080;
            --bg:          #0A1118;
        }

        body {
            width: 1200px;
            height: 630px;
            overflow: hidden;
            font-family: 'Satoshi', -apple-system, sans-serif;
            background: var(--bg);
            position: relative;
        }

        /* ── Atmospheric background ── */
        .bg-base {
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse 80% 70% at 35% 55%, rgba(32, 224, 170, 0.07) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 70% 40%, rgba(0, 133, 255, 0.05) 0%, transparent 55%),
                radial-gradient(ellipse 100% 80% at 50% 110%, rgba(52, 240, 128, 0.04) 0%, transparent 50%),
                var(--bg);
        }

        /* Soft noise-grain overlay */
        .bg-grain {
            position: absolute;
            inset: 0;
            opacity: 0.35;
            mix-blend-mode: overlay;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            background-size: 200px 200px;
        }

        /* Main glow — teal/aqua centered behind logo */
        .orb-center {
            position: absolute;
            width: 600px;
            height: 350px;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -55%);
            background: radial-gradient(
                ellipse at center,
                rgba(32, 224, 170, 0.10) 0%,
                rgba(0, 133, 255, 0.06) 40%,
                transparent 70%
            );
            filter: blur(50px);
        }

        /* Secondary glow — slight green below */
        .orb-floor {
            position: absolute;
            width: 900px;
            height: 200px;
            bottom: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(
                ellipse at center,
                rgba(52, 240, 128, 0.04) 0%,
                transparent 70%
            );
            filter: blur(40px);
        }

        /* Horizontal light streak */
        .streak {
            position: absolute;
            width: 1400px;
            height: 1px;
            top: 50%;
            left: -100px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(32, 224, 170, 0.08) 25%,
                rgba(32, 224, 170, 0.18) 50%,
                rgba(0, 133, 255, 0.08) 75%,
                transparent 100%
            );
        }

        .streak-soft {
            position: absolute;
            width: 1400px;
            height: 80px;
            top: calc(50% - 40px);
            left: -100px;
            background: linear-gradient(
                90deg,
                transparent 0%,
                rgba(32, 224, 170, 0.02) 25%,
                rgba(32, 224, 170, 0.04) 50%,
                rgba(0, 133, 255, 0.02) 75%,
                transparent 100%
            );
            filter: blur(25px);
        }

        /* Edge vignette */
        .vignette {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse 75% 65% at 50% 48%, transparent 35%, var(--bg) 100%);
            z-index: 2;
            pointer-events: none;
        }

        /* ── Content ── */
        .content {
            position: relative;
            z-index: 10;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
        }

        /* The actual PNG logo */
        .logo {
            width: 110px;
            height: 110px;
            border-radius: 26px;
            object-fit: contain;
            box-shadow:
                0 0 50px rgba(32, 224, 170, 0.20),
                0 0 100px rgba(0, 133, 255, 0.10),
                0 12px 40px rgba(0, 0, 0, 0.5);
            margin-bottom: 32px;
        }

        /* App name — uses the logo's teal→cyan→blue gradient */
        .app-name {
            font-size: 132px;
            font-weight: 900;
            letter-spacing: -5px;
            line-height: 1;
            background: linear-gradient(
                135deg,
                #CEEAFF 0%,
                #ffffff 15%,
                #ffffff 35%,
                #40D8C8 60%,
                #20E0AA 80%,
                #34F080 100%
            );
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 50px rgba(32, 224, 170, 0.12));
            margin-bottom: 20px;
        }

        /* Tagline */
        .tagline {
            font-size: 28px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.40);
            letter-spacing: -0.3px;
            text-align: center;
            line-height: 1.3;
        }

        .tagline strong {
            color: rgba(255, 255, 255, 0.75);
            font-weight: 900;
        }

        /* ── Decorative chat bubbles ── */
        .bubble {
            position: absolute;
            border-radius: 18px;
            z-index: 5;
        }

        .dot-row {
            display: flex;
            gap: 7px;
            padding: 16px 22px;
        }

        .dot {
            height: 9px;
            border-radius: 50%;
        }

        /* Left bubbles — teal tones */
        .bubble-l1 {
            width: 200px;
            left: 60px;
            top: 150px;
            background: rgba(32, 224, 170, 0.06);
            border: 1px solid rgba(32, 224, 170, 0.10);
            border-bottom-left-radius: 5px;
            transform: rotate(-1.5deg);
        }
        .bubble-l1 .dot { width: 9px; background: rgba(32, 224, 170, 0.22); }

        .bubble-l2 {
            width: 150px;
            left: 88px;
            bottom: 155px;
            background: rgba(52, 240, 128, 0.05);
            border: 1px solid rgba(52, 240, 128, 0.08);
            border-bottom-left-radius: 5px;
            transform: rotate(1deg);
        }
        .bubble-l2 .dot { width: 9px; background: rgba(52, 240, 128, 0.18); }

        /* Right bubbles — blue tones */
        .bubble-r1 {
            width: 170px;
            right: 60px;
            top: 190px;
            background: rgba(0, 133, 255, 0.06);
            border: 1px solid rgba(0, 133, 255, 0.10);
            border-bottom-right-radius: 5px;
            transform: rotate(1.5deg);
        }
        .bubble-r1 .dot { width: 9px; background: rgba(0, 133, 255, 0.22); }

        .bubble-r2 {
            width: 190px;
            right: 80px;
            bottom: 140px;
            background: rgba(126, 192, 255, 0.04);
            border: 1px solid rgba(126, 192, 255, 0.07);
            border-bottom-right-radius: 5px;
            transform: rotate(-1deg);
        }
        .bubble-r2 .dot { width: 9px; background: rgba(126, 192, 255, 0.15); }

        /* ── E2E badge ── */
        .badge {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 24px;
            background: rgba(32, 224, 170, 0.05);
            border: 1px solid rgba(32, 224, 170, 0.10);
            border-radius: 100px;
            margin-top: 28px;
        }

        .badge svg {
            width: 16px;
            height: 16px;
            fill: none;
            stroke: rgba(32, 224, 170, 0.50);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .badge span {
            font-size: 12px;
            font-weight: 800;
            color: rgba(32, 224, 170, 0.45);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* ── Subtle corner marks ── */
        .corner {
            position: absolute;
            width: 24px;
            height: 24px;
            z-index: 15;
            opacity: 0.12;
        }
        .corner::before, .corner::after {
            content: '';
            position: absolute;
            background: var(--aqua);
        }
        .corner.tl { top: 32px; left: 32px; }
        .corner.tl::before { top: 0; left: 0; width: 1px; height: 100%; }
        .corner.tl::after  { top: 0; left: 0; width: 100%; height: 1px; }

        .corner.tr { top: 32px; right: 32px; }
        .corner.tr::before { top: 0; right: 0; width: 1px; height: 100%; }
        .corner.tr::after  { top: 0; right: 0; width: 100%; height: 1px; }

        .corner.bl { bottom: 32px; left: 32px; }
        .corner.bl::before { bottom: 0; left: 0; width: 1px; height: 100%; }
        .corner.bl::after  { bottom: 0; left: 0; width: 100%; height: 1px; }

        .corner.br { bottom: 32px; right: 32px; }
        .corner.br::before { bottom: 0; right: 0; width: 1px; height: 100%; }
        .corner.br::after  { bottom: 0; right: 0; width: 100%; height: 1px; }

        /* "Built on DeSo" watermark */
        .watermark {
            position: absolute;
            bottom: 36px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.12);
            z-index: 15;
        }
    </style>
</head>
<body>
    <!-- Background layers -->
    <div class="bg-base"></div>
    <div class="bg-grain"></div>
    <div class="orb-center"></div>
    <div class="orb-floor"></div>
    <div class="streak-soft"></div>
    <div class="streak"></div>
    <div class="vignette"></div>

    <!-- Decorative chat bubbles -->
    <div class="bubble bubble-l1">
        <div class="dot-row">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
            <div class="dot" style="width:28px;border-radius:5px"></div>
        </div>
    </div>
    <div class="bubble bubble-r1">
        <div class="dot-row">
            <div class="dot" style="width:22px;border-radius:5px"></div>
            <div class="dot"></div><div class="dot"></div>
        </div>
    </div>
    <div class="bubble bubble-l2">
        <div class="dot-row">
            <div class="dot"></div>
            <div class="dot" style="width:24px;border-radius:5px"></div>
        </div>
    </div>
    <div class="bubble bubble-r2">
        <div class="dot-row">
            <div class="dot" style="width:18px;border-radius:5px"></div>
            <div class="dot"></div><div class="dot"></div>
            <div class="dot" style="width:14px;border-radius:5px"></div>
        </div>
    </div>

    <!-- Corner marks -->
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>

    <!-- Main content -->
    <div class="content">
        <img src="ChatOn-Logo-Small.png" alt="ChatOn" class="logo">
        <div class="app-name">ChatOn</div>
        <div class="tagline">Messaging that <strong>no one</strong> can shut down.</div>
        <div class="badge">
            <svg viewBox="0 0 24 24">
                <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                <polyline points="9 12 11 14 15 10"/>
            </svg>
            <span>End-to-End Encrypted</span>
        </div>
    </div>

    <!-- Watermark -->
    <div class="watermark">Built on DeSo</div>
</body>
</html>
