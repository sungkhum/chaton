  <body style="background-color: #040609; background-image: linear-gradient(0deg, #040609, #040609 10%, #050e1d 40%, #050e1d); margin: 0;">
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Splash screen: visible instantly, removed by App once content is ready -->
    <div id="splash" style="
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background-color: #040609;
      background-image: linear-gradient(0deg, #040609, #040609 10%, #050e1d 40%, #050e1d);
    ">
      <div style="
        width: 32px; height: 32px;
        border: 3px solid rgba(52, 240, 128, 0.2);
        border-top-color: #34F080;
        border-radius: 50%;
        animation: splash-spin 0.7s linear infinite;
      "></div>
      <style>
        @keyframes splash-spin {
          to { transform: rotate(360deg); }
        }
      </style>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
