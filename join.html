<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, interactive-widget=resizes-content" />
    <title>You're invited to a group on ChatOn</title>

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#0F1520" />
    <meta name="color-scheme" content="dark" />

    <!-- SEO -->
    <meta
      name="description"
      content="You've been invited to join a private group chat on ChatOn. End-to-end encrypted messaging on the DeSo blockchain."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="You're invited to a group on ChatOn" />
    <meta property="og:description" content="Join a private, end-to-end encrypted group chat on ChatOn. Messaging that no one can shut down." />
    <meta property="og:image" content="https://getchaton.com/chaton-invited.webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/webp" />
    <meta property="og:image:alt" content="You're invited — Join a private group on ChatOn" />
    <meta property="og:site_name" content="ChatOn" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="You're invited to a group on ChatOn" />
    <meta name="twitter:description" content="Join a private, end-to-end encrypted group chat. Messaging that no one can shut down." />
    <meta name="twitter:image" content="https://getchaton.com/chaton-invited.webp" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
  </head>
  <body style="background-color: #040609; background-image: linear-gradient(0deg, #040609, #040609 10%, #050e1d 40%, #050e1d); margin: 0;">
    <noscript>You need to enable JavaScript to run this app.</noscript>

    <!-- Splash screen: same as main app so transition is seamless -->
    <div id="splash" style="
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(0deg, #040609, #040609 10%, #050e1d 40%, #050e1d);
    ">
      <img
        src="/ChatOn-Logo-Small.png"
        alt="ChatOn"
        width="80"
        height="80"
        style="border-radius: 20px; animation: splash-pulse 1.8s ease-in-out infinite;"
      />
    </div>
    <style>
      @keyframes splash-pulse {
        0%, 100% { opacity: 0.6; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }
    </style>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
